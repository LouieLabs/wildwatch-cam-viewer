name: Live deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write       # required for Workload Identity Federation

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA_EMAIL }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_USE_MOCKS: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: louielabs-animal-cams.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: louielabs-animal-cams
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Deploy to Firebase Hosting (live)
        run: |
          npx --yes firebase-tools@13 deploy \
            --only hosting:wildwatch-cam-viewer \
            --project louielabs-animal-cams \
            --non-interactive
