name: Preview deploy

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  id-token: write       # required for Workload Identity Federation
  pull-requests: write  # required to post the preview URL as a PR comment

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA_EMAIL }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_USE_MOCKS: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: louielabs-animal-cams.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: louielabs-animal-cams
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy preview channel
        id: preview
        run: |
          # Channel ID = PR number when triggered by a PR, branch name otherwise.
          # Sanitize for Firebase's channel-id rules (alphanumeric + dash, <=63 chars).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANNEL_ID="pr-${{ github.event.number }}"
          else
            CHANNEL_ID="${{ github.ref_name }}"
          fi
          CHANNEL_ID=$(echo "$CHANNEL_ID" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | cut -c1-63)
          echo "Channel: $CHANNEL_ID"

          OUTPUT=$(npx --yes firebase-tools@13 hosting:channel:deploy "$CHANNEL_ID" \
            --only wildwatch-cam-viewer \
            --expires 30d \
            --project louielabs-animal-cams \
            --non-interactive \
            --json)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | jq -r '.result["wildwatch-cam-viewer"].url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL_ID" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const channel = '${{ steps.preview.outputs.channel }}';
            const body =
              `WildWatch preview (channel \`${channel}\`):\n` +
              `${url}\n` +
              `_Expires in 30 days. Re-deploys on every push to this branch._`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('WildWatch preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
